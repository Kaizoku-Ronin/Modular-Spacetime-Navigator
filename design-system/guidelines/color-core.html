<!-- @dsCard group="Colors" viewport="700x180" name="Core — void, teal & ink" subtitle="The instrument palette: near-black void, HUD teal, pale-cyan ink scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); font-family: var(--font-mono); padding: 22px; }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .sw { display: flex; flex-direction: column; gap: 8px; }
  .chip { width: 104px; height: 64px; border-radius: var(--radius-sm); border: var(--border-hud-line); }
  .name { font-size: 9.5px; letter-spacing: var(--track-label); text-transform: uppercase; color: var(--ink); }
  .hex { font-size: 9.5px; color: var(--ink-dim); letter-spacing: 0.04em; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--void)"></div><span class="name">Void · bg</span><span class="hex">#03050a</span></div>
    <div class="sw"><div class="chip" style="background:var(--panel);backdrop-filter:var(--blur-hud)"></div><span class="name">Panel glass</span><span class="hex">rgba(6,12,18,.72)</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal)"></div><span class="name">Teal · primary</span><span class="hex">#46e0d2</span></div>
    <div class="sw"><div class="chip" style="background:var(--teal-deep)"></div><span class="name">Teal deep</span><span class="hex">#1d6b66</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink)"></div><span class="name">Ink · text</span><span class="hex">#cfe7e6</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-mid)"></div><span class="name">Ink mid</span><span class="hex">#9fd0cb</span></div>
    <div class="sw"><div class="chip" style="background:var(--ink-dim)"></div><span class="name">Ink dim · label</span><span class="hex">#5f7e7d</span></div>
  </div>
</body>
</html>
