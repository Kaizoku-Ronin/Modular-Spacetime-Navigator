<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing scale" subtitle="Six steps, xs → 3xl (4 / 8 / 16 / 24 / 40 / 64 / 100px)" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); padding: 24px; font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 18px; }
  .step { display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .bar { background: var(--teal); height: 14px; border-radius: 2px; }
  .name { font-size: 9.5px; color: var(--ink); letter-spacing: var(--track-label); text-transform: uppercase; }
  .px { font-size: 9px; color: var(--ink-dim); }
</style>
</head>
<body>
  <div class="row">
    <div class="step"><div class="bar" style="width:4px"></div><span class="name">xs</span><span class="px">4</span></div>
    <div class="step"><div class="bar" style="width:8px"></div><span class="name">sm</span><span class="px">8</span></div>
    <div class="step"><div class="bar" style="width:16px"></div><span class="name">md</span><span class="px">16</span></div>
    <div class="step"><div class="bar" style="width:24px"></div><span class="name">lg</span><span class="px">24</span></div>
    <div class="step"><div class="bar" style="width:40px"></div><span class="name">xl</span><span class="px">40</span></div>
    <div class="step"><div class="bar" style="width:64px"></div><span class="name">2xl</span><span class="px">64</span></div>
    <div class="step"><div class="bar" style="width:100px"></div><span class="name">3xl</span><span class="px">100</span></div>
  </div>
</body>
</html>
