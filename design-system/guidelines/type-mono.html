<!-- @dsCard group="Type" viewport="700x230" name="HUD voice — JetBrains Mono" subtitle="Telemetry, labels & badges. UPPERCASE, wide tracking, tabular numerals." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--void); padding: 24px; font-family: var(--font-mono); }
  .meta { font-size: 9px; color: var(--ink-dim); letter-spacing: var(--track-label); text-transform: uppercase; margin-bottom: 10px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 40px; max-width: 480px; margin-bottom: 18px; }
  .label { font-size: 9.5px; color: var(--ink-dim); text-transform: uppercase; letter-spacing: var(--track-wide); }
  .value { font-size: 12px; color: var(--teal); font-variant-numeric: tabular-nums; text-align: right; }
  .row { display: contents; }
  .pills { display: flex; gap: 8px; align-items: center; }
  .pill { font-size: 8px; font-weight: 700; letter-spacing: var(--track-wider); text-transform: uppercase; padding: 3px 8px; border-radius: var(--radius-sm); }
</style>
</head>
<body>
  <div class="meta">Telemetry rows · 9.5–12px · tabular</div>
  <div class="grid">
    <span class="label">Distance</span><span class="value">0.605 AU</span>
    <span class="label">Velocity</span><span class="value">0.200 c</span>
    <span class="label">Lorentz γ</span><span class="value">7.09</span>
    <span class="label">Aboard</span><span class="value">00:01:12</span>
  </div>
  <div class="meta">Pills & badges</div>
  <div class="pills">
    <span class="pill" style="color:var(--teal);background:var(--teal-12);border:1px solid var(--teal-30)">CRUISE</span>
    <span class="pill" style="color:var(--warn);background:var(--warn-12);border:1px solid var(--warn-30)">FLIGHT</span>
    <span class="pill" style="color:var(--violet);background:var(--violet-12);border:1px solid var(--violet-30)">HYPERJUMP</span>
  </div>
</body>
</html>
